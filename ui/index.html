<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Investment Pipeline</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23DA7756'/></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@33/dist/ag-grid-community.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@33/styles/ag-grid.css"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Manrope:wght@400;500;600;700;800&display=swap');

    :root {
      color-scheme: dark;
      --bg: #0c0a09;
      --bg-strong: #1c1917;
      --surface: #1c1917;
      --surface-strong: #292524;
      --surface-soft: rgba(28, 25, 23, 0.92);
      --border: rgba(68, 64, 60, 0.82);
      --border-strong: rgba(120, 113, 108, 0.9);
      --text: #fafaf9;
      --muted: #a8a29e;
      --subtle: #78716c;
      --accent: #c15f3c;
      --accent-soft: rgba(193, 95, 60, 0.16);
      --positive: #86efac;
      --positive-soft: rgba(20, 83, 45, 0.52);
      --warning: #fbbf24;
      --warning-soft: rgba(120, 53, 15, 0.48);
      --danger: #fca5a5;
      --danger-soft: rgba(127, 29, 29, 0.42);
    }

    body {
      background:
        radial-gradient(circle at top left, rgba(193, 95, 60, 0.14), transparent 24%),
        linear-gradient(180deg, #181311 0%, #100d0b 18%, #0c0a09 46%, #0c0a09 100%);
      color: var(--text);
      font-family: 'Manrope', system-ui, sans-serif;
      letter-spacing: -0.01em;
    }

    .font-mono,
    code,
    pre,
    #drawer-ticker,
    #modal-ticker {
      font-family: 'JetBrains Mono', ui-monospace, monospace !important;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      line-height: 1.5;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      white-space: nowrap;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      color: var(--muted);
    }
    .b-deep-research { background: var(--accent-soft); color: var(--accent); border-color: rgba(202, 140, 98, 0.28); }
    .b-monitor-only,
    .b-owned,
    .b-own,
    .b-monitor { background: var(--positive-soft); color: var(--positive); border-color: rgba(120, 194, 170, 0.28); }
    .b-watchlist,
    .b-watch,
    .b-medium,
    .b-deep-dive { background: var(--warning-soft); color: var(--warning); border-color: rgba(209, 171, 104, 0.28); }
    .b-rejected,
    .b-pass,
    .b-high,
    .b-discard { background: var(--danger-soft); color: var(--danger); border-color: rgba(208, 131, 131, 0.28); }
    .b-approved,
    .b-refresh { background: rgba(68, 64, 60, 0.42); color: var(--text); border-color: var(--border-strong); }
    .b-inbox,
    .b-low,
    .b-triage { background: rgba(28, 25, 23, 0.7); color: var(--muted); border-color: var(--border); }

    .card {
      background: linear-gradient(180deg, rgba(28, 25, 23, 0.98), rgba(22, 18, 16, 0.98));
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    }
    .panel { padding: 20px 22px; }
    .table-shell { padding: 8px; overflow: hidden; }
    .hero-banner {
      padding: 22px;
      overflow: hidden;
      position: relative;
      background:
        linear-gradient(140deg, rgba(255,255,255,0.03), rgba(255,255,255,0)),
        linear-gradient(180deg, rgba(28, 25, 23, 0.99), rgba(20, 16, 14, 0.99));
    }
    .hero-banner::after {
      content: '';
      position: absolute;
      right: -80px;
      bottom: -120px;
      width: 260px;
      height: 260px;
      background: radial-gradient(circle, rgba(193, 95, 60, 0.18), transparent 70%);
      pointer-events: none;
    }
    .section-kicker {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--subtle);
    }
    .section-title {
      font-size: 1.18rem;
      font-weight: 750;
      letter-spacing: -0.03em;
      color: var(--text);
    }
    .section-subtitle {
      font-size: 0.9rem;
      line-height: 1.65;
      color: var(--muted);
    }
    .metric-strip {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(148px, 1fr));
      gap: 12px;
    }
    .metric-tile {
      min-height: 88px;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(41, 37, 36, 0.42);
      transition: transform 150ms ease, border-color 150ms ease, background 150ms ease;
    }
    .metric-tile.clickable { cursor: pointer; }
    .metric-tile.clickable:hover {
      transform: translateY(-1px);
      border-color: var(--border-strong);
      background: rgba(68, 64, 60, 0.38);
    }
    .metric-label {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--subtle);
    }
    .metric-value {
      margin-top: 8px;
      font-size: 1.42rem;
      line-height: 1.05;
      font-weight: 800;
      letter-spacing: -0.05em;
      color: var(--text);
    }
    .metric-meta {
      margin-top: 6px;
      font-size: 12px;
      line-height: 1.5;
      color: var(--muted);
    }
    .tone-accent .metric-value { color: var(--accent); }
    .tone-positive .metric-value { color: var(--positive); }
    .tone-warning .metric-value { color: var(--warning); }
    .tone-danger .metric-value { color: var(--danger); }

    .overview-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr);
      gap: 20px;
    }
    .split-panel {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(0, 0.9fr);
      gap: 20px;
    }
    .portfolio-layout {
      display: grid;
      grid-template-columns: minmax(0, 2.15fr) minmax(320px, 1fr);
      gap: 20px;
      align-items: start;
    }
    .panel-caption {
      margin-bottom: 10px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--subtle);
    }
    .mini-table {
      width: 100%;
      border-collapse: collapse;
    }
    .mini-table th {
      padding: 0 0 10px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--subtle);
      text-align: left;
    }
    .mini-table td {
      padding: 11px 0;
      border-top: 1px solid rgba(148, 163, 184, 0.08);
      vertical-align: top;
      color: var(--text);
    }
    .queue-table {
      width: 100%;
      min-width: 1040px;
      border-collapse: separate;
      border-spacing: 0;
    }
    .queue-table thead {
      background: rgba(12, 10, 9, 0.94);
    }
    .queue-table th {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(68, 64, 60, 0.9);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-align: left;
      color: var(--subtle);
      white-space: nowrap;
    }
    .queue-table td {
      padding: 13px 16px;
      border-bottom: 1px solid rgba(68, 64, 60, 0.46);
      vertical-align: top;
      font-size: 12px;
      line-height: 1.35;
      color: var(--text);
      background: transparent;
    }
    .queue-table tbody tr:last-child td {
      border-bottom: none;
    }
    .queue-table tbody tr.is-clickable {
      cursor: pointer;
    }
    .queue-table tbody tr.is-clickable:hover td {
      background: rgba(41, 37, 36, 0.42);
    }
    .queue-table tbody tr.is-muted td {
      opacity: 0.74;
    }
    .queue-table .badge {
      padding: 2px 8px;
      font-size: 9px;
      line-height: 1.35;
    }
    .queue-symbol {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
    }
    .queue-company {
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12.5px;
      color: #d6d3d1;
    }
    .queue-badge-stack {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      gap: 6px;
      min-height: 24px;
    }
    .queue-date {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
    }
    .queue-date.is-empty {
      color: var(--subtle);
    }
    .queue-freshness {
      margin-top: 5px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      line-height: 1.3;
      color: var(--muted);
    }
    .queue-freshness-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      display: inline-block;
      flex-shrink: 0;
    }
    .queue-freshness-age {
      color: var(--subtle);
    }
    .queue-tag-list {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      gap: 6px;
      max-width: 280px;
    }
    .queue-tag {
      display: inline-flex;
      align-items: center;
      padding: 2px 7px;
      border-radius: 999px;
      border: 1px solid rgba(68, 64, 60, 0.82);
      background: rgba(28, 25, 23, 0.82);
      color: var(--muted);
      font-size: 10px;
      line-height: 1.25;
      letter-spacing: 0.03em;
      white-space: nowrap;
    }
    .queue-tag-more {
      display: inline-flex;
      align-items: center;
      font-size: 10px;
      color: var(--subtle);
    }
    .queue-empty {
      color: var(--subtle);
      font-size: 11px;
    }
    .queue-empty-row {
      padding: 42px 16px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }
    .table-symbol {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
    }
    .table-meta {
      margin-top: 2px;
      font-size: 12px;
      line-height: 1.5;
      color: var(--muted);
    }
    .clickable-row { cursor: pointer; }
    .clickable-row:hover td { background: rgba(41, 37, 36, 0.3); }
    .bar-stack { display: flex; flex-direction: column; gap: 10px; }
    .bar-row { display: grid; grid-template-columns: minmax(0, 1fr) 64px; gap: 12px; align-items: center; }
    .bar-track {
      height: 7px;
      border-radius: 999px;
      background: rgba(41, 37, 36, 0.72);
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 999px;
      background: var(--accent);
    }
    .warning-stack {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .warning-item {
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(209, 171, 104, 0.2);
      background: linear-gradient(180deg, rgba(120, 53, 15, 0.38), rgba(69, 26, 3, 0.12));
      color: var(--warning);
      font-size: 13px;
      line-height: 1.55;
    }
    .empty-panel {
      padding: 18px;
      border-radius: 14px;
      border: 1px dashed var(--border);
      background: rgba(28, 25, 23, 0.64);
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
    }

    .tab-btn {
      padding: 12px 2px 11px;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      border: none;
      border-bottom: 2px solid transparent;
      border-radius: 0;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      background: transparent;
    }
    .tab-btn:hover {
      color: var(--text);
    }
    .tab-btn.active {
      color: var(--text);
      border-bottom-color: var(--accent);
    }

    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.18); border-radius: 999px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(148, 163, 184, 0.28); }

    .ag-theme-alpine-dark {
      --ag-background-color: transparent;
      --ag-odd-row-background-color: rgba(12, 10, 9, 0.44);
      --ag-header-background-color: rgba(12, 10, 9, 0.9);
      --ag-border-color: var(--border);
      --ag-row-border-color: rgba(68, 64, 60, 0.55);
      --ag-foreground-color: var(--text);
      --ag-secondary-foreground-color: var(--muted);
      --ag-header-foreground-color: var(--subtle);
      --ag-selected-row-background-color: rgba(193, 95, 60, 0.12);
      --ag-row-hover-color: rgba(41, 37, 36, 0.5);
      --ag-font-family: 'Manrope', system-ui, sans-serif;
      --ag-font-size: 13px;
      --ag-cell-horizontal-padding: 14px;
      --ag-row-height: 50px;
      --ag-header-height: 42px;
      --ag-wrapper-border-radius: 12px;
    }

    .md-content h1 { font-size: 1.4rem; font-weight: 700; margin: 1.2rem 0 0.4rem; color: var(--text); border-bottom: 1px solid var(--border); padding-bottom: 0.4rem; }
    .md-content h2 { font-size: 1.15rem; font-weight: 600; margin: 1rem 0 0.3rem; color: var(--text); }
    .md-content h3 { font-size: 1rem; font-weight: 600; margin: 0.75rem 0 0.25rem; color: var(--muted); }
    .md-content p  { margin: 0.5rem 0; color: #cbd5e1; line-height: 1.7; }
    .md-content ul { list-style: disc; padding-left: 1.5rem; margin: 0.5rem 0; }
    .md-content ol { list-style: decimal; padding-left: 1.5rem; margin: 0.5rem 0; }
    .md-content li { margin: 0.25rem 0; color: #cbd5e1; line-height: 1.55; }
    .md-content table { width: 100%; border-collapse: collapse; margin: 0.75rem 0; font-size: 0.85rem; }
    .md-content th { background: rgba(12, 10, 9, 0.9); padding: 0.4rem 0.65rem; text-align: left; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: var(--muted); border: 1px solid var(--border); }
    .md-content td { padding: 0.4rem 0.65rem; border: 1px solid var(--border); color: #cbd5e1; }
    .md-content tr:nth-child(even) td { background: rgba(12, 10, 9, 0.36); }
    .md-content code { background: rgba(12, 10, 9, 0.7); padding: 0.1rem 0.3rem; border-radius: 5px; font-size: 0.85em; color: var(--warning); }
    .md-content pre  { background: rgba(12, 10, 9, 0.8); padding: 1rem; border-radius: 12px; overflow-x: auto; margin: 0.75rem 0; }
    .md-content pre code { background: none; padding: 0; }
    .md-content strong { color: var(--text); font-weight: 600; }
    .md-content blockquote { border-left: 3px solid var(--accent); padding-left: 1rem; margin: 0.5rem 0; color: var(--muted); }
    .md-content hr { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }
    .md-content a { color: var(--accent); text-decoration: underline; }
    .search-snippet mark { background: transparent; color: var(--warning); font-weight: 600; }

    /* Scoreboard table overrides */
    #scoreboard-table th {
      font-size: 12px;
      padding: 14px 14px;
      position: relative;
      white-space: nowrap;
      background: rgba(12, 10, 9, 0.96);
    }
    #scoreboard-table td {
      font-size: 14px;
      padding: 12px 14px;
    }
    #scoreboard-table th .sb-tip {
      display: none;
      position: absolute;
      left: 50%;
      top: 100%;
      transform: translateX(-50%);
      z-index: 10;
      white-space: normal;
      width: max-content;
      max-width: 260px;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0;
      text-transform: none;
      line-height: 1.45;
      color: var(--text);
      background: var(--surface-strong);
      border: 1px solid var(--border-strong);
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      pointer-events: none;
    }
    #scoreboard-table th:hover .sb-tip {
      display: block;
    }
    #tab-scoreboard {
      max-width: none !important;
    }

    @media (max-width: 1100px) {
      .overview-grid,
      .split-panel,
      .portfolio-layout {
        grid-template-columns: 1fr;
      }
    }
    @media (max-width:768px) {
      #ticker-drawer { width:100% !important; }
      .hero-banner,
      .panel { padding: 18px; }
      .metric-strip { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width:560px) {
      .metric-strip { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body class="min-h-screen antialiased">

  <!-- HEADER -->
  <header class="sticky top-0 z-40" style="background:rgba(28,25,23,0.96); border-bottom:1px solid var(--border); box-shadow:0 1px 0 rgba(255,255,255,0.02);">
    <div class="max-w-[1440px] mx-auto px-4 sm:px-6">
      <div class="flex items-center justify-between gap-4 py-4">
        <div class="flex items-center gap-4 min-w-0">
          <span style="color:var(--accent); font-size:1.25rem; line-height:1;">◈</span>
          <div class="min-w-0">
            <div class="flex items-center gap-3 flex-wrap">
              <h1 class="font-semibold tracking-tight" style="font-size:15px;">Investment Pipeline</h1>
              <span id="header-counts" class="text-xs" style="color:var(--subtle);"></span>
            </div>
            <p class="text-[11px] uppercase tracking-[0.16em]" style="color:var(--subtle);">Research Workspace</p>
          </div>
        </div>
        <button id="refresh-btn" class="text-xs transition-colors px-3.5 py-2 rounded-lg" style="border:1px solid var(--border); color:var(--muted); background:rgba(41,37,36,0.72);">
          ↻ Refresh
        </button>
      </div>
      <nav class="flex gap-6 overflow-x-auto">
        <button class="tab-btn active" data-tab="overview">Overview</button>
        <button class="tab-btn" data-tab="portfolio">Portfolio</button>
        <button class="tab-btn" data-tab="queue">Queue</button>
        <button class="tab-btn" data-tab="reports">Reports</button>
        <button class="tab-btn" data-tab="scoreboard">Scoreboard</button>
        <button class="tab-btn" data-tab="pipeline">Pipeline</button>
      </nav>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="max-w-[1440px] mx-auto px-4 sm:px-6 py-6">
    <div id="tab-overview"></div>
    <div id="tab-portfolio" class="hidden"></div>
    <div id="tab-queue"    class="hidden"></div>
    <div id="tab-reports"  class="hidden"></div>
    <div id="tab-scoreboard" class="hidden"></div>
    <div id="tab-pipeline" class="hidden"></div>
  </main>

  <!-- DRAWER BACKDROP -->
  <div id="drawer-backdrop" class="hidden fixed inset-0 z-40"
       style="background:rgba(12,10,9,0.72);"
       onclick="closeDrawer()"></div>

  <!-- TICKER DRAWER -->
  <div id="ticker-drawer"
       class="fixed top-0 right-0 h-full z-50 flex flex-col"
       style="width:520px; background:var(--bg-strong); border-left:1px solid var(--border);
              transform:translateX(100%); transition:transform 250ms ease-out;
              box-shadow: -24px 0 56px rgba(0,0,0,0.45);">
    <div id="drawer-header" style="padding:16px 20px; border-bottom:1px solid var(--border);
         display:flex; align-items:center; gap:10px; flex-shrink:0; background:var(--bg-strong);">
      <span id="drawer-ticker" style="font-family:monospace; font-weight:700; font-size:18px; color:var(--accent);"></span>
      <span id="drawer-company" style="color:var(--muted); font-size:14px;"></span>
      <span id="drawer-verdict"></span>
      <button onclick="closeDrawer()"
              style="margin-left:auto; color:var(--muted); font-size:22px; line-height:1; background:none; border:none; cursor:pointer;">&times;</button>
    </div>
    <div id="drawer-body" style="flex:1; overflow-y:auto; padding:20px;"></div>
    <div id="drawer-footer" style="padding:14px 20px; border-top:1px solid var(--border); flex-shrink:0; background:var(--bg-strong);"></div>
  </div>

  <!-- REPORT MODAL -->
  <div id="report-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4" style="background:rgba(12,10,9,0.82);">
    <div class="card w-full flex flex-col" style="max-width:1100px; max-height:92vh; border-color:var(--border-strong);">
      <!-- Modal header -->
      <div id="modal-header" class="flex items-center justify-between px-6 py-4 flex-shrink-0" style="border-bottom:1px solid var(--border);">
        <div class="flex items-center gap-3">
          <span id="modal-ticker" class="font-mono font-bold text-xl" style="color:var(--accent);"></span>
          <span id="modal-company" class="text-slate-300"></span>
          <span id="modal-verdict"></span>
        </div>
        <button onclick="closeModal()" class="text-slate-400 hover:text-white text-2xl leading-none" style="line-height:1;">&times;</button>
      </div>
      <!-- Modal body -->
      <div id="modal-body" class="flex-1 overflow-y-auto p-6"></div>
      <!-- Modal footer -->
      <div id="modal-footer" class="px-6 py-4 flex-shrink-0" style="border-top:1px solid #292524;"></div>
    </div>
  </div>

  <!-- MARKDOWN MODAL -->
  <div id="md-modal" class="hidden fixed inset-0 z-60 flex items-center justify-center p-4" style="background:rgba(12,10,9,0.88); z-index:60;">
    <div class="flex flex-col w-full" style="max-width:960px; max-height:94vh; background:var(--bg); border:1px solid var(--border-strong); border-radius:16px;">
      <div class="flex items-center justify-between px-6 py-4 flex-shrink-0" style="border-bottom:1px solid var(--border);">
        <span id="md-modal-title" class="font-semibold text-slate-200"></span>
        <button onclick="closeMdModal()" class="text-slate-400 hover:text-white text-2xl" style="line-height:1;">&times;</button>
      </div>
      <div id="md-modal-body" class="flex-1 overflow-y-auto p-6 md-content"></div>
    </div>
  </div>

  <!-- COMMAND PALETTE -->
  <div id="cmd-palette" class="hidden fixed inset-0 z-50 flex items-start justify-center pt-24"
       style="background: rgba(12,10,9,0.88); z-index:70;"
       onclick="if(event.target===this) closeCmdPalette()">
    <div style="width:600px; background:var(--bg-strong); border:1px solid var(--border-strong); border-radius:14px; overflow:hidden; box-shadow:0 24px 64px rgba(0,0,0,0.6);">
      <div style="display:flex; align-items:center; padding:14px 16px; border-bottom:1px solid var(--border); gap:10px;">
        <span style="color:var(--muted); font-size:15px;">&#8984;</span>
        <input id="cmd-input" type="text" placeholder="Search tickers, jump to page, run action…"
               style="flex:1; background:transparent; border:none; outline:none; color:var(--text); font-size:14px;"
               oninput="updateCmdResults(this.value)"
               onkeydown="handleCmdKey(event)">
        <kbd style="background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:6px; padding:2px 6px; font-size:11px; color:var(--muted);">ESC</kbd>
      </div>
      <div id="cmd-results" style="max-height:360px; overflow-y:auto; padding:6px;"></div>
      <div id="cmd-footer" style="padding:8px 12px; border-top:1px solid var(--border); font-size:11px; color:var(--subtle); display:flex; justify-content:space-between;">
        <span id="search-stats"></span>
        <a href="#" onclick="rebuildSearchIndex(); return false" style="color:var(--subtle); text-decoration:underline;">Rebuild index</a>
      </div>
    </div>
  </div>

  <script>
  // ─── STATE ───────────────────────────────────────────────────────────────────
  const STATE = {
    queue:      [],
    reports:    [],
    pipeline:   {},
    activeTab:  'overview',
    filters:    { search: '', states: [], verdict: '', freshness: '', sort: 'last_analysis_date', dir: 'desc' },
    reportSort: 'date',
    radarChart: null,
    queueInited: false,
    freshness:  {},
    portfolio: null,
    portfolioInited: false,
    portfolioSort: { field: 'weight_pct', dir: 'desc' },
    portfolioGrid: null,
    scoreboard: [],
    scoreboardGrid: null,
    scoreboardFilters: { verdict: '', minScore: 0, confidence: '' },
  }

  // ─── UTILS ───────────────────────────────────────────────────────────────────
  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
  }
  function scoreColor(s) {
    if (s == null) return 'var(--subtle)'
    if (s >= 8)   return 'var(--positive)'
    if (s >= 6)   return 'var(--warning)'
    return 'var(--danger)'
  }
  function fmtDate(d) { return d ? d.replace(/-/g, '/') : '—' }
  function priorityRank(p) { return ({ high: 0, medium: 1, low: 2 }[String(p || '').toLowerCase()] ?? 3) }
  function stateLabel(s) { return s ? s.replace(/_/g, ' ') : '—' }
  function actionLabel(s) { return s ? s.replace(/_/g, ' ') : 'No next step' }
  function reportExists(ticker) { return STATE.reports.some(r => r.ticker === ticker) }

  function scoreDots(score, size=8) {
    if (score == null) return '<span style="color:var(--subtle);font-size:11px">—</span>'
    const c = scoreColor(score)
    return Array.from({length:10},(_,i) =>
      `<span style="display:inline-block;width:${size}px;height:${size}px;border-radius:50%;margin-right:2px;background:${i<score?c:'rgba(255,255,255,0.08)'}"></span>`
    ).join('')
  }

  function verdictBadge(v) {
    if (!v) return '<span style="color:var(--subtle)">—</span>'
    const cls = v==='Own' ? 'b-own' : v==='Watch' ? 'b-watch' : v==='Pass' ? 'b-pass' : 'b-inbox'
    return `<span class="badge ${cls}">${esc(v)}</span>`
  }

  function stateBadge(s) {
    if (!s) return '<span style="color:var(--subtle)">—</span>'
    const clsMap = {
      deep_research:'b-deep-research', monitor_only:'b-monitor-only',
      watchlist:'b-watchlist', inbox:'b-inbox', rejected:'b-rejected',
      approved:'b-approved', owned:'b-owned', triage:'b-triage',
    }
    return `<span class="badge ${clsMap[s]||'b-inbox'}">${esc(stateLabel(s))}</span>`
  }

  function priorityBadge(p) {
    if (!p) return '—'
    const cls = p==='high' ? 'b-high' : p==='medium' ? 'b-medium' : 'b-low'
    return `<span class="badge ${cls}">${esc(p)}</span>`
  }

  function actionBadge(a) {
    const clsMap = { deep_dive:'b-deep-dive', refresh:'b-refresh', monitor:'b-monitor', discard:'b-discard' }
    return `<span class="badge ${clsMap[a]||'b-inbox'}">${esc(actionLabel(a||'—'))}</span>`
  }

  function scoreRow(label, score) {
    if (score == null) return ''
    return `
      <div class="flex items-center justify-between py-1" style="border-bottom:1px solid rgba(148, 163, 184, 0.08);">
        <span class="text-xs text-slate-400">${esc(label)}</span>
        <div class="flex items-center gap-2">
          <span class="text-sm font-mono font-bold" style="color:${scoreColor(score)};min-width:1.5rem;text-align:right;">${score}</span>
          <div>${scoreDots(score,6)}</div>
        </div>
      </div>`
  }

  function listSection(title, items, icon='•', color='var(--muted)') {
    if (!items || items.length===0) return ''
    return `
      <div class="mb-4">
        <h4 class="text-xs font-semibold uppercase tracking-wider mb-2" style="color:${color};">${esc(title)}</h4>
        <ul class="space-y-1">
          ${items.map(item => `<li class="text-sm text-slate-300 flex gap-2"><span style="color:${color};flex-shrink:0;">${icon}</span><span>${esc(item)}</span></li>`).join('')}
        </ul>
      </div>`
  }

  function getFreshnessInfo(ticker) {
    const f = STATE.freshness?.[ticker]
    const colors = {
      fresh: 'var(--positive)',
      aging: 'var(--warning)',
      stale: 'var(--danger)',
      never: 'var(--subtle)',
    }
    const labels = { fresh:'Fresh', aging:'Aging', stale:'Stale', never:'Never' }
    const status = f?.status || 'never'
    return {
      color: colors[status] || 'var(--subtle)',
      label: labels[status] || 'Unknown',
      age: f?.days_since != null ? `${f.days_since}d ago` : 'No report',
    }
  }

  function renderQueueFreshness(ticker) {
    const info = getFreshnessInfo(ticker)
    return `<div class="queue-freshness">
      <span class="queue-freshness-dot" style="background:${info.color};"></span>
      <span style="color:${info.color};">${esc(info.label)}</span>
      <span class="queue-freshness-age">${esc(info.age)}</span>
    </div>`
  }

  function renderQueueAnalysisCell(q) {
    const hasDate = Boolean(q.last_analysis_date)
    return `
      <div>
        <div class="queue-date${hasDate ? '' : ' is-empty'}">${esc(fmtDate(q.last_analysis_date))}</div>
        ${renderQueueFreshness(q.ticker)}
      </div>`
  }

  function renderQueueTags(tags) {
    if (!tags || tags.length === 0) return '<span class="queue-empty">—</span>'
    const visible = tags.slice(0, 3)
    const moreCount = tags.length - visible.length
    return `<div class="queue-tag-list">
      ${visible.map(tag => `<span class="queue-tag">${esc(tag)}</span>`).join('')}
      ${moreCount > 0 ? `<span class="queue-tag-more">+${moreCount}</span>` : ''}
    </div>`
  }

  // ─── TAB SWITCHING ───────────────────────────────────────────────────────────
  function switchTab(name) {
    document.querySelectorAll('[data-tab]').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.tab === name)
    })
    document.querySelectorAll('#tab-overview,#tab-portfolio,#tab-queue,#tab-reports,#tab-scoreboard,#tab-pipeline').forEach(el => {
      el.classList.add('hidden')
    })
    document.getElementById(`tab-${name}`).classList.remove('hidden')
    // Widen the main container for scoreboard
    const main = document.querySelector('main')
    if (name === 'scoreboard') {
      main.style.maxWidth = 'none'
      main.style.padding = '24px 24px'
    } else {
      main.style.maxWidth = ''
      main.style.padding = ''
    }
    STATE.activeTab = name
    renderTab(name)
  }

  function renderTab(name) {
    if (name === 'overview')   renderOverview()
    if (name === 'portfolio')  renderPortfolio()
    if (name === 'queue')      renderQueue()
    if (name === 'reports')    renderReports()
    if (name === 'scoreboard') renderScoreboard()
    if (name === 'pipeline')   renderPipeline()
  }

  function filterByState(state) {
    STATE.filters.states = [state]
    STATE.filters.search  = ''
    STATE.filters.verdict = ''
    STATE.filters.freshness = ''
    STATE.queueInited = false  // force re-init of filter controls
    switchTab('queue')
  }

  function filterByFreshness(status) {
    STATE.filters.states = []
    STATE.filters.search = ''
    STATE.filters.verdict = ''
    STATE.filters.freshness = status
    STATE.queueInited = false
    switchTab('queue')
  }

  function focusQueueTicker(ticker) {
    STATE.filters.states = []
    STATE.filters.search = ticker
    STATE.filters.verdict = ''
    STATE.filters.freshness = ''
    STATE.queueInited = false
    switchTab('queue')
  }

  // ─── TAB 1: OVERVIEW ─────────────────────────────────────────────────────────
  function renderOverview() {
    const container = document.getElementById('tab-overview')
    const counts = {}
    for (const q of STATE.queue) counts[q.current_state] = (counts[q.current_state] || 0) + 1

    const freshnessCounts = { fresh: 0, aging: 0, stale: 0, never: 0 }
    Object.values(STATE.freshness || {}).forEach(f => {
      freshnessCounts[f.status || 'never'] = (freshnessCounts[f.status || 'never'] || 0) + 1
    })

    const queueRows = STATE.queue.map(q => {
      const freshness = STATE.freshness?.[q.ticker] || { status: 'never', days_since: null }
      let urgency = 0
      if (q.current_state === 'deep_research') urgency += 120
      if (q.priority === 'high') urgency += 80
      if (freshness.status === 'stale') urgency += 60
      if (freshness.status === 'aging') urgency += 24
      if (q.current_verdict === 'Own') urgency += 18
      return { ...q, freshness_status: freshness.status, days_since: freshness.days_since, urgency }
    })

    const attentionRows = queueRows
      .filter(q =>
        q.current_state !== 'rejected' && (
          q.current_state === 'deep_research' ||
          q.priority === 'high' ||
          q.freshness_status === 'stale' ||
          (q.freshness_status === 'aging' && q.current_verdict === 'Own')
        )
      )
      .sort((a, b) => b.urgency - a.urgency || priorityRank(a.priority) - priorityRank(b.priority) || (b.days_since || 0) - (a.days_since || 0))
      .slice(0, 6)

    const recent = [...STATE.reports]
      .filter(r => r.analysis_date && r.has_json)
      .sort((a, b) => (b.analysis_date || '').localeCompare(a.analysis_date || ''))
      .slice(0, 7)

    const scan = STATE.pipeline.scan
    const triage = STATE.pipeline.triage
    const overviewPortfolio = STATE.portfolio
    const topHoldings = overviewPortfolio?.positions
      ? [...overviewPortfolio.positions].sort((a, b) => (b.weight_pct || 0) - (a.weight_pct || 0)).slice(0, 5)
      : []
    const largestPosition = topHoldings[0] || null
    const focusCount = (triage?.b2?.deep_dive || 0) + (triage?.b2?.refresh || 0)

    const heroMetrics = [
      { label: 'Tracked', value: STATE.queue.length, meta: 'names in the queue', tone: 'tone-accent' },
      { label: 'Deep Research', value: counts.deep_research || 0, meta: 'awaiting full analysis', tone: 'tone-accent', action: `filterByState('deep_research')` },
      { label: 'Stale', value: freshnessCounts.stale || 0, meta: 'older than 30 days', tone: 'tone-danger', action: `filterByFreshness('stale')` },
      { label: 'Reports', value: STATE.reports.length, meta: 'latest final reports', tone: 'tone-positive', action: `switchTab('reports')` },
      { label: 'Gross Exposure', value: overviewPortfolio ? fmtPct(overviewPortfolio.summary.gross_pct) : '—', meta: overviewPortfolio ? `Net ${fmtPct(overviewPortfolio.summary.net_pct)}` : 'portfolio unavailable', tone: overviewPortfolio && overviewPortfolio.summary.gross_pct > 130 ? 'tone-danger' : 'tone-warning', compact: true, action: overviewPortfolio ? `switchTab('portfolio')` : '' },
      { label: 'Largest Position', value: largestPosition ? `${largestPosition.ticker} ${fmtPct(largestPosition.weight_pct)}` : '—', meta: largestPosition ? 'highest weight in book' : 'no holdings loaded', tone: 'tone-warning', compact: true, action: largestPosition ? `switchTab('portfolio')` : '' },
    ].map(m => `
      <div class="metric-tile ${m.tone} ${m.action ? 'clickable' : ''}" ${m.action ? `onclick="${m.action}"` : ''}>
        <div class="metric-label">${m.label}</div>
        <div class="metric-value"${m.compact ? ' style="font-size:1.04rem;line-height:1.35;"' : ''}>${esc(m.value)}</div>
        <div class="metric-meta">${esc(m.meta)}</div>
      </div>`).join('')

    const stateDefs = [
      { key: 'deep_research', label: 'Deep research', color: 'var(--accent)' },
      { key: 'watchlist', label: 'Watchlist', color: 'var(--warning)' },
      { key: 'monitor_only', label: 'Monitor only', color: 'var(--positive)' },
      { key: 'inbox', label: 'Inbox', color: 'var(--muted)' },
      { key: 'rejected', label: 'Rejected', color: 'var(--danger)' },
    ]
    const queueMixRows = stateDefs.map(def => {
      const count = counts[def.key] || 0
      const pct = STATE.queue.length ? (count / STATE.queue.length) * 100 : 0
      return `
        <div class="bar-row" style="cursor:pointer;" onclick="filterByState('${def.key}')">
          <div>
            <div class="flex items-center justify-between gap-3 mb-2">
              <span class="text-sm" style="color:var(--text);">${esc(def.label)}</span>
              <span class="text-xs font-mono" style="color:${def.color};">${fmtPct(pct)}</span>
            </div>
            <div class="bar-track"><div class="bar-fill" style="width:${pct.toFixed(1)}%; background:${def.color};"></div></div>
          </div>
          <div class="text-right text-sm font-semibold" style="color:var(--text);">${count}</div>
        </div>`
    }).join('')

    const freshnessDefs = [
      { key: 'stale', label: 'Stale', color: 'var(--danger)' },
      { key: 'aging', label: 'Aging', color: 'var(--warning)' },
      { key: 'fresh', label: 'Fresh', color: 'var(--positive)' },
      { key: 'never', label: 'Never', color: 'var(--muted)' },
    ]
    const freshnessRows = freshnessDefs.map(def => {
      const count = freshnessCounts[def.key] || 0
      const pct = STATE.queue.length ? (count / STATE.queue.length) * 100 : 0
      return `
        <div class="bar-row" style="cursor:pointer;" onclick="filterByFreshness('${def.key}')">
          <div>
            <div class="flex items-center justify-between gap-3 mb-2">
              <span class="text-sm" style="color:var(--text);">${esc(def.label)}</span>
              <span class="text-xs font-mono" style="color:${def.color};">${count}</span>
            </div>
            <div class="bar-track"><div class="bar-fill" style="width:${pct.toFixed(1)}%; background:${def.color};"></div></div>
          </div>
          <div class="text-right text-xs" style="color:var(--subtle);">${fmtPct(pct)}</div>
        </div>`
    }).join('')

    const attentionBody = attentionRows.length
      ? `<table class="mini-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Status</th>
              <th>Why Now</th>
            </tr>
          </thead>
          <tbody>
            ${attentionRows.map(q => {
              const action = reportExists(q.ticker)
                ? `openReportModal('${q.ticker.replace(/'/g,"\\'")}')`
                : `focusQueueTicker('${q.ticker.replace(/'/g,"\\'")}')`
              const why = []
              if (q.current_state === 'deep_research') why.push('deep research')
              if (q.freshness_status === 'stale' && q.days_since != null) why.push(`${q.days_since}d stale`)
              else if (q.freshness_status === 'aging' && q.days_since != null) why.push(`${q.days_since}d aging`)
              if (q.priority === 'high') why.push('high priority')
              if (q.next_required_action) why.push(actionLabel(q.next_required_action))
              return `
                <tr class="clickable-row" onclick="${action}">
                  <td>
                    <div class="table-symbol">${esc(q.ticker)}</div>
                    <div class="table-meta">${esc(q.company || '—')}</div>
                  </td>
                  <td>
                    <div class="flex flex-wrap gap-2">
                      ${stateBadge(q.current_state)}
                      ${priorityBadge(q.priority)}
                    </div>
                  </td>
                  <td>
                    <div class="text-sm" style="color:var(--text);">${esc(why.join(' · ') || 'Needs review')}</div>
                    <div class="table-meta">${q.last_analysis_date ? `Last analysis ${fmtDate(q.last_analysis_date)}` : 'No report on disk yet'}</div>
                  </td>
                </tr>`
            }).join('')}
          </tbody>
        </table>`
      : '<div class="empty-panel">Nothing urgent surfaced from the queue. The current pipeline is either fresh or already triaged.</div>'

    let portfolioHealthBody = '<div class="empty-panel">Portfolio data is unavailable. The overview still renders pipeline status, but the portfolio health module is waiting for a ledger snapshot.</div>'
    if (overviewPortfolio) {
      const overviewWarningBlock = overviewPortfolio.warnings?.length
        ? `<div class="panel-caption mt-5">Policy watch</div>
           <div class="warning-stack">${overviewPortfolio.warnings.slice(0, 3).map(w => `<div class="warning-item">${esc(w)}</div>`).join('')}</div>`
        : ''
      portfolioHealthBody = `
        <div class="metric-strip mb-5">
          <div class="metric-tile tone-${overviewPortfolio.summary.total_pnl > 0 ? 'positive' : overviewPortfolio.summary.total_pnl < 0 ? 'danger' : 'warning'}">
            <div class="metric-label">Total P&amp;L</div>
            <div class="metric-value">${esc(fmtMoney(overviewPortfolio.summary.total_pnl))}</div>
            <div class="metric-meta">${esc(fmtMoney(overviewPortfolio.summary.realized_pnl))} realized</div>
          </div>
          <div class="metric-tile tone-warning">
            <div class="metric-label">Cash</div>
            <div class="metric-value">${esc(fmtMoney(overviewPortfolio.summary.cash))}</div>
            <div class="metric-meta">${topHoldings.length} core holdings tracked</div>
          </div>
          <div class="metric-tile ${overviewPortfolio.summary.gross_pct > 130 ? 'tone-danger' : 'tone-accent'}">
            <div class="metric-label">Exposure</div>
            <div class="metric-value">${esc(fmtPct(overviewPortfolio.summary.gross_pct))}</div>
            <div class="metric-meta">Net ${esc(fmtPct(overviewPortfolio.summary.net_pct))}</div>
          </div>
          <div class="metric-tile tone-warning">
            <div class="metric-label">Largest</div>
            <div class="metric-value" style="font-size:1.08rem;line-height:1.35;">${esc(largestPosition ? `${largestPosition.ticker} ${fmtPct(largestPosition.weight_pct)}` : '—')}</div>
            <div class="metric-meta">${largestPosition ? 'largest weight in book' : 'no positions'}</div>
          </div>
        </div>
        <div class="panel-caption">Top positions</div>
        <table class="mini-table">
          <thead>
            <tr>
              <th>Holding</th>
              <th>Side</th>
              <th style="text-align:right;">Weight</th>
              <th style="text-align:right;">Unr. %</th>
            </tr>
          </thead>
          <tbody>
            ${topHoldings.map(p => `
              <tr ${reportExists(p.ticker) ? `class="clickable-row" onclick="openReportModal('${p.ticker.replace(/'/g,"\\'")}')"` : ''}>
                <td>
                  <div class="table-symbol">${esc(p.ticker)}</div>
                  <div class="table-meta">${esc(p.sector || p.thesis_tag || '—')}</div>
                </td>
                <td>${p.side === 'short'
                  ? '<span class="badge b-pass">Short</span>'
                  : '<span class="badge b-monitor-only">Long</span>'}</td>
                <td style="text-align:right; font-family:\'JetBrains Mono\', ui-monospace, monospace;">${fmtPct(p.weight_pct)}</td>
                <td style="text-align:right; font-family:\'JetBrains Mono\', ui-monospace, monospace; color:${pnlColor(p.unrealized_pct)};">${fmtPct(p.unrealized_pct)}</td>
              </tr>`).join('')}
          </tbody>
        </table>
        ${overviewWarningBlock}`
    }

    const recentBody = recent.length
      ? `<table class="mini-table">
          <thead>
            <tr>
              <th>Report</th>
              <th>Verdict</th>
              <th style="text-align:right;">Score</th>
              <th style="text-align:right;">Date</th>
            </tr>
          </thead>
          <tbody>
            ${recent.map(r => `
              <tr class="clickable-row" onclick="openReportModal('${r.ticker.replace(/'/g,"\\'")}')">
                <td>
                  <div class="table-symbol">${esc(r.ticker)}</div>
                  <div class="table-meta">${esc(r.company || '—')}</div>
                </td>
                <td>${verdictBadge(r.verdict)}</td>
                <td style="text-align:right; font-family:'JetBrains Mono', ui-monospace, monospace; color:${scoreColor(r.average_score)};">${r.average_score != null ? Number(r.average_score).toFixed(1) : '—'}</td>
                <td style="text-align:right; color:var(--muted);">${fmtDate(r.analysis_date)}</td>
              </tr>`).join('')}
          </tbody>
        </table>`
      : '<div class="empty-panel">No reports are available yet.</div>'

    const pipelineSummary = [
      { label: 'Latest Scan', value: scan ? scan.total_candidates || 0 : '—', meta: scan ? fmtDate(scan.scan_date) : 'not run', tone: 'tone-accent' },
      { label: 'B1 Advance', value: triage?.b1?.advance ?? '—', meta: triage ? fmtDate(triage.triage_date) : 'no triage', tone: 'tone-warning' },
      { label: 'B2 Focus', value: focusCount || '—', meta: triage?.b2 ? `${triage.b2.deep_dive || 0} deep dive · ${triage.b2.refresh || 0} refresh` : 'no focused shortlist', tone: 'tone-positive' },
    ].map(item => `
      <div class="metric-tile ${item.tone}">
        <div class="metric-label">${item.label}</div>
        <div class="metric-value">${esc(item.value)}</div>
        <div class="metric-meta">${esc(item.meta)}</div>
      </div>`).join('')

    const shortlistBody = triage?.deep_dive_shortlist?.length
      ? `<table class="mini-table">
          <thead>
            <tr>
              <th>Candidate</th>
              <th>Action</th>

  // ─── TAB 2: QUEUE ────────────────────────────────────────────────────────────
  function getFilteredQueue() {
    let rows = [...STATE.queue]
    const { search, states, verdict, sort, dir } = STATE.filters
    if (search) {
      const q = search.toLowerCase()
      rows = rows.filter(r =>
        (r.ticker||'').toLowerCase().includes(q) ||
        (r.company||'').toLowerCase().includes(q)
      )
    }
    if (states.length) rows = rows.filter(r => states.includes(r.current_state))
    if (verdict)       rows = rows.filter(r => r.current_verdict === verdict)
    if (STATE.filters.freshness) {
      rows = rows.filter(r => STATE.freshness?.[r.ticker]?.status === STATE.filters.freshness)
    }
    rows.sort((a,b) => {
      let av = a[sort] ?? '', bv = b[sort] ?? ''
      if (sort === 'priority') {
        const po = {high:0,medium:1,low:2}
        av = po[av]??3; bv = po[bv]??3
      }
      if (av < bv) return dir==='asc' ? -1 : 1
      if (av > bv) return dir==='asc' ? 1 : -1
      return 0
    })
    return rows
  }

  function sortQueue(field) {
    if (STATE.filters.sort === field) STATE.filters.dir = STATE.filters.dir==='asc' ? 'desc' : 'asc'
    else { STATE.filters.sort = field; STATE.filters.dir = 'desc' }
    updateQueueTable()
  }

  function updateQueueTable() {
    const filtered  = getFilteredQueue()
    const statsEl   = document.getElementById('q-stats')
    const bodyEl    = document.getElementById('q-table-body')
    const headersEl = document.getElementById('q-table-head')
    if (!bodyEl) return

    if (statsEl) statsEl.innerHTML = `Showing <strong class="text-slate-200">${filtered.length}</strong> of ${STATE.queue.length}`

    function si(field) {
      if (STATE.filters.sort !== field) return '<span style="color:#44403c;font-size:10px;">⇅</span>'
      return STATE.filters.dir==='asc'
        ? '<span style="color:#e07a5f;font-size:10px;">↑</span>'
        : '<span style="color:#e07a5f;font-size:10px;">↓</span>'
    }

    if (headersEl) headersEl.innerHTML = `
      <tr>
        <th class="cursor-pointer hover:text-slate-200" onclick="sortQueue('ticker')">Ticker ${si('ticker')}</th>
        <th class="cursor-pointer hover:text-slate-200" onclick="sortQueue('company')">Company ${si('company')}</th>
        <th class="cursor-pointer hover:text-slate-200" onclick="sortQueue('current_state')">State ${si('current_state')}</th>
        <th class="cursor-pointer hover:text-slate-200" onclick="sortQueue('priority')">Priority ${si('priority')}</th>
        <th class="cursor-pointer hover:text-slate-200" onclick="sortQueue('current_verdict')">Verdict ${si('current_verdict')}</th>
        <th class="cursor-pointer hover:text-slate-200" onclick="sortQueue('last_analysis_date')">Last Analysis ${si('last_analysis_date')}</th>
        <th class="cursor-pointer hover:text-slate-200" onclick="sortQueue('last_triage_date')">Last Triage ${si('last_triage_date')}</th>
        <th>Tags</th>
      </tr>`

    if (filtered.length === 0) {
      bodyEl.innerHTML = '<tr><td colspan="8" class="queue-empty-row">No results match your filters.</td></tr>'
      return
    }

    bodyEl.innerHTML = filtered.map(q => {
      const hasReport = STATE.reports.some(r => r.ticker === q.ticker)
      return `<tr class="${hasReport ? 'is-clickable' : 'is-muted'}"
               ${hasReport ? `onclick="openReportModal('${q.ticker.replace(/'/g,"\\'")}')"` : ''}>
        <td><div class="queue-symbol">${esc(q.ticker)}</div></td>
        <td><div class="queue-company">${esc(q.company||'—')}</div></td>
        <td><div class="queue-badge-stack">${stateBadge(q.current_state)}</div></td>
        <td><div class="queue-badge-stack">${priorityBadge(q.priority)}</div></td>
        <td><div class="queue-badge-stack">${verdictBadge(q.current_verdict)}</div></td>
        <td>${renderQueueAnalysisCell(q)}</td>
        <td><div class="queue-date${q.last_triage_date ? '' : ' is-empty'}">${esc(fmtDate(q.last_triage_date))}</div></td>
        <td>${renderQueueTags(q.tags || [])}</td>
      </tr>`
    }).join('')
  }

        ${s.label}
      </button>`).join('')

    let sorted = [...STATE.reports]
    if (STATE.reportSort === 'score')   sorted.sort((a,b) => (b.average_score||0) - (a.average_score||0))
    if (STATE.reportSort === 'date')    sorted.sort((a,b) => (b.analysis_date||'').localeCompare(a.analysis_date||''))
    if (STATE.reportSort === 'ticker')  sorted.sort((a,b) => (a.ticker||'').localeCompare(b.ticker||''))
    if (STATE.reportSort === 'verdict') {
      const vo = {Own:0,Watch:1,Pass:2}
      sorted.sort((a,b) => (vo[a.verdict]??3) - (vo[b.verdict]??3))
    }

    const cards = sorted.map(r => {
      const hasJson = r.has_json !== false
      return `
        <div onclick="openReportModal('${r.ticker.replace(/'/g,"\\'")}') "
             class="card p-4 cursor-pointer hover:border-slate-500 transition-colors flex flex-col gap-2">
          <div class="flex items-start justify-between">
            <span class="font-mono font-bold" style="color:#e07a5f;">${esc(r.ticker)}</span>
            ${hasJson ? verdictBadge(r.verdict) : '<span class="badge b-inbox" style="font-size:10px;">No JSON</span>'}
          </div>
          <div class="text-xs text-slate-400 truncate">${esc(r.company||'')}</div>
          ${hasJson && r.average_score!=null ? `
            <div class="flex items-center gap-2">
              <span class="text-lg font-bold font-mono" style="color:${scoreColor(r.average_score)};">${Number(r.average_score).toFixed(1)}</span>
              <div>${scoreDots(Math.round(r.average_score),7)}</div>
            </div>` : ''}
          <div class="flex items-center justify-between mt-auto pt-1" style="border-top:1px solid #292524;">
            <span class="text-xs text-slate-500">${fmtDate(r.analysis_date)}</span>
            ${r.confidence ? `<span class="text-xs text-slate-500">${esc(r.confidence)}</span>` : ''}
          </div>
        </div>`
    }).join('')

    container.innerHTML = `
      <div class="flex items-center justify-between mb-4">
        <div class="text-xs text-slate-500">${sorted.length} reports</div>
        <div class="flex gap-2 items-center">
          <span class="text-xs text-slate-500 mr-1">Sort:</span>
          ${sortBtns}
        </div>
      </div>
      <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3">
        ${cards || '<p class="text-slate-500 text-sm col-span-5">No reports found.</p>'}
      </div>`
  }

  // ─── TAB: SCOREBOARD ─────────────────────────────────────────────────────────
  const SCORE_TOOLTIPS = {
    ticker: 'Stock ticker symbol',
    company: 'Company name',
    verdict: 'Investment decision: Own, Watch, or Pass',
    average_score: 'Average of all 8 umbrella scores (0–10)',
    circle_of_competence: 'Circle of Competence — how well we understand this business',
    competitive_advantage: 'Durable Competitive Advantage — moat strength and durability',
    management: 'Management & Capital Allocation quality',
    business_economics: 'Business Economics — margins, ROIC, unit economics',
    balance_sheet: 'Balance Sheet Safety — leverage, liquidity, debt coverage',
    valuation: 'Valuation — price vs intrinsic value estimate',
    margin_of_safety: 'Margin of Safety — discount to conservative IV',
    temperament: 'Temperament & Time Horizon — behavioral discipline',
    iv_conservative: 'Bear-case intrinsic value per share',
    iv_base: 'Base-case intrinsic value per share',
    iv_bull: 'Bull-case intrinsic value per share',
    mos_pct: 'Margin of Safety % — negative means overvalued',
    confidence: 'Analysis confidence level (high / medium / low)',
    red_flag_count: 'Number of red flags identified',
    analysis_date: 'When the analysis was completed',
  }

  const SCORE_HEADERS = {
    ticker: 'Ticker', company: 'Company', verdict: 'Verdict', average_score: 'Avg',
    circle_of_competence: 'CoC', competitive_advantage: 'Moat', management: 'Mgmt',
    business_economics: 'Econ', balance_sheet: 'B/S', valuation: 'Val',
    margin_of_safety: 'MoS', temperament: 'Temp',
    iv_conservative: 'IV Bear', iv_base: 'IV Base', iv_bull: 'IV Bull',
    mos_pct: 'MOS %', confidence: 'Conf', red_flag_count: 'Flags', analysis_date: 'Date',
  }

  const SCORE_COLS_ORDER = [
    'ticker','company','verdict','average_score',
    'circle_of_competence','competitive_advantage','management','business_economics',
    'balance_sheet','valuation','margin_of_safety','temperament',
    'iv_conservative','iv_base','iv_bull','mos_pct',
    'confidence','red_flag_count','analysis_date',
  ]

  const UMBRELLA_COLS = [
    'circle_of_competence','competitive_advantage','management','business_economics',
    'balance_sheet','valuation','margin_of_safety','temperament','average_score',
  ]

  function sbScoreColor(v) {
    if (v == null) return ''
    if (v < 4) return 'color:var(--danger); font-weight:700;'
    if (v < 7) return 'color:var(--warning); font-weight:700;'
    return 'color:var(--positive); font-weight:700;'
  }

  function sbMosColor(v) {
    if (v == null) return ''
    return v >= 0 ? 'color:var(--positive); font-weight:700;' : 'color:var(--danger); font-weight:700;'
  }

  function sbVerdictColor(v) {
    if (v === 'Own') return 'color:var(--positive); font-weight:700;'
    if (v === 'Watch') return 'color:var(--warning); font-weight:700;'
    if (v === 'Pass') return 'color:var(--danger); font-weight:700;'
    return ''
  }

  function renderScoreboard() {
    const container = document.getElementById('tab-scoreboard')
    const data = STATE.scoreboard
    if (!data.length) {
      container.innerHTML = '<div class="empty-panel">No analyzed reports found. Run the analysis pipeline first.</div>'
      return
    }

    const f = STATE.scoreboardFilters
    let filtered = data
    if (f.verdict) filtered = filtered.filter(r => r.verdict === f.verdict)
    if (f.confidence) filtered = filtered.filter(r => String(r.confidence || '').toLowerCase().startsWith(f.confidence))
    if (f.minScore > 0) filtered = filtered.filter(r => (r.average_score || 0) >= f.minScore)

    function filterBtn(label, field, value) {
      const active = f[field] === value
      return `<button onclick="STATE.scoreboardFilters.${field}=${active ? "''" : `'${value}'`}; renderScoreboard()"
        class="px-3 py-1 text-xs rounded transition-colors"
        style="${active ? 'background:var(--accent);color:#fff;' : 'background:var(--surface);color:var(--muted);border:1px solid var(--border);'}">${label}</button>`
    }

    // Build the table header
    const LEFT_COLS = new Set(['ticker','company'])
    const sortArrow = (key) => _sbSortKey === key ? (_sbSortDir === 'desc' ? ' ↓' : ' ↑') : ''
    const thCells = SCORE_COLS_ORDER.map(key => {
      const label = SCORE_HEADERS[key]
      const tip = SCORE_TOOLTIPS[key]
      const align = LEFT_COLS.has(key) ? '' : ' style="text-align:center;"'
      return `<th${align}>${esc(label)}${sortArrow(key)}<span class="sb-tip">${esc(tip)}</span></th>`
    }).join('')

    // Build table rows
    const rows = filtered.map(r => {
      const cells = SCORE_COLS_ORDER.map(key => {
        const val = r[key]
        let style = ''
        let display = ''

        if (key === 'ticker') {
          return `<td class="queue-symbol" style="cursor:pointer;" onclick="openReportModal('${esc(r.ticker)}')">${esc(val || '—')}</td>`
        }
        if (key === 'company') {
          return `<td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted);">${esc(val || '—')}</td>`
        }
        if (key === 'verdict') {
          style = sbVerdictColor(val)
          return `<td style="text-align:center;${style}">${esc(val || '—')}</td>`
        }
        if (UMBRELLA_COLS.includes(key)) {
          style = sbScoreColor(val)
          display = val != null ? (key === 'average_score' ? Number(val).toFixed(1) : String(val)) : '—'
          return `<td style="text-align:center;font-family:'JetBrains Mono',monospace;${style}">${display}</td>`
        }
        if (key === 'mos_pct') {
          style = sbMosColor(val)
          display = val != null ? (val >= 0 ? '+' : '') + Number(val).toFixed(1) + '%' : '—'
          return `<td style="text-align:center;font-family:'JetBrains Mono',monospace;${style}">${display}</td>`
        }
        if (key === 'iv_conservative' || key === 'iv_base' || key === 'iv_bull') {
          display = val != null ? '$' + Number(val).toLocaleString(undefined, {maximumFractionDigits:0}) : '—'
          return `<td style="text-align:center;font-family:'JetBrains Mono',monospace;color:var(--text);">${display}</td>`
        }
        if (key === 'red_flag_count') {
          const flagStyle = val > 0 ? 'color:var(--danger);font-weight:600;' : 'color:var(--subtle);'
          return `<td style="text-align:center;${flagStyle}">${val != null ? val : '—'}</td>`
        }
        if (key === 'confidence') {
          const raw = String(val || '—')
          const first = raw.split(/[\s—\-:,]/)[0].toLowerCase()
          const confColor = first === 'high' ? 'var(--positive)' : first === 'medium' ? 'var(--warning)' : first === 'low' ? 'var(--danger)' : 'var(--subtle)'
          const short = first.charAt(0).toUpperCase() + first.slice(1)
          return `<td title="${esc(raw)}" style="text-align:center;color:${confColor};font-size:11px;font-weight:600;text-transform:uppercase;white-space:nowrap;cursor:help;">${esc(short)}</td>`
        }
        if (key === 'analysis_date') {
          return `<td style="text-align:center;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:11px;">${esc(fmtDate(val))}</td>`
        }
        return `<td style="color:var(--text);">${esc(val != null ? val : '—')}</td>`
      }).join('')
      return `<tr class="is-clickable" onclick="openReportModal('${esc(r.ticker)}')">${cells}</tr>`
    }).join('')

    container.innerHTML = `
      <div class="space-y-4" style="max-width:none; margin:0 -24px;">
        <div style="padding:0 24px;">
          <div class="flex items-center gap-4 flex-wrap mb-4">
            <div class="flex items-center gap-2 flex-wrap">
              <span class="text-xs uppercase tracking-widest" style="color:var(--subtle);">Verdict</span>
              ${filterBtn('All','verdict','')}
              ${filterBtn('Own','verdict','Own')}
              ${filterBtn('Watch','verdict','Watch')}
              ${filterBtn('Pass','verdict','Pass')}
            </div>
            <div class="flex items-center gap-2 flex-wrap">
              <span class="text-xs uppercase tracking-widest" style="color:var(--subtle);">Confidence</span>
              ${filterBtn('All','confidence','')}
              ${filterBtn('High','confidence','high')}
              ${filterBtn('Medium','confidence','medium')}
              ${filterBtn('Low','confidence','low')}
            </div>
            <div class="flex items-center gap-2">
              <span class="text-xs uppercase tracking-widest" style="color:var(--subtle);">Min Score</span>
              <input type="range" min="0" max="10" step="0.5" value="${f.minScore}"
                onchange="STATE.scoreboardFilters.minScore=Number(this.value); renderScoreboard()"
                style="width:100px; accent-color:var(--accent);">
              <span class="text-xs font-mono" style="color:var(--text);">${f.minScore > 0 ? '≥' + f.minScore : 'All'}</span>
            </div>
            <div class="text-xs" style="color:var(--subtle);">${filtered.length} / ${data.length}</div>
          </div>
        </div>
        <div style="overflow:auto; max-height:calc(97vh - 180px); width:95%; margin:0 auto; border-radius:12px; border:1px solid var(--border);">
          <table class="queue-table" id="scoreboard-table" style="min-width:1200px; width:100%;">
            <thead style="position:sticky; top:0; z-index:2;"><tr>${thCells}</tr></thead>
            <tbody>${rows || '<tr><td colspan="19" class="queue-empty-row">No tickers match the current filters.</td></tr>'}</tbody>
          </table>
        </div>
      </div>`

    // Make columns sortable by clicking headers
    document.querySelectorAll('#scoreboard-table thead th').forEach((th, idx) => {
      th.style.cursor = 'pointer'
      th.addEventListener('click', () => {
        const key = SCORE_COLS_ORDER[idx]
        sortScoreboard(key)
      })
    })
  }

  let _sbSortKey = 'average_score'
  let _sbSortDir = 'desc'

  function sortScoreboard(key) {
    if (_sbSortKey === key) {
      _sbSortDir = _sbSortDir === 'desc' ? 'asc' : 'desc'
    } else {
      _sbSortKey = key
      _sbSortDir = 'desc'
    }
    const dir = _sbSortDir === 'desc' ? -1 : 1
    STATE.scoreboard.sort((a, b) => {
      let va = a[key], vb = b[key]
      if (va == null && vb == null) return 0
      if (va == null) return 1
      if (vb == null) return -1
      if (typeof va === 'string') return va.localeCompare(vb) * dir
      return (va - vb) * dir
    })
    renderScoreboard()
  }

  // ─── TAB 4: PIPELINE ─────────────────────────────────────────────────────────
  function renderPipeline() {
    const container = document.getElementById('tab-pipeline')
    const scan   = STATE.pipeline.scan
    const triage = STATE.pipeline.triage
    const nReports = STATE.reports.length

    // Stage flow numbers
    const stageA1 = scan ? (scan.total_candidates||'?') : '?'
    const stageA2 = scan ? (scan.total_candidates||'?') : '?'
    const stageB1 = triage?.b1?.advance ?? '?'
    const stageB2 = (triage?.b2?.deep_dive||0) + (triage?.b2?.refresh||0)
    const stageC  = nReports

    function stageBox(label, sublabel, count, color='#c15f3c') {
      return `
        <div class="card text-center p-4" style="min-width:110px; border-top:2px solid ${color};">
          <div class="text-xs font-bold uppercase tracking-wider mb-1" style="color:${color};">${label}</div>
          <div class="text-2xl font-bold text-slate-200 mb-1">${count}</div>
          <div class="text-xs text-slate-500">${sublabel}</div>
        </div>`
    }
    const arrow = `<div class="flex items-center text-slate-600 text-xl px-1">→</div>`

    const flowHtml = `
      <div class="flex items-center flex-wrap gap-2">
        ${stageBox('A1','Universe', stageA1,'#64748b')}
        ${arrow}
        ${stageBox('A2','Candidates', stageA2,'#64748b')}
        ${arrow}
        ${stageBox('B1','Advance', stageB1,'#f59e0b')}
        ${arrow}
        ${stageBox('B2','Deep Dive', stageB2,'#a78bfa')}
        ${arrow}
        ${stageBox('C','Reports', stageC,'#22c55e')}
      </div>`

    // Scan bucket mini chart
    let bucketChartHtml = '<p class="text-slate-500 text-xs">No scan data.</p>'
    if (scan?.counts_by_bucket) {
      const buckets = Object.entries(scan.counts_by_bucket).sort((a,b)=>b[1]-a[1])
      const maxB = Math.max(...buckets.map(b=>b[1]))
      bucketChartHtml = buckets.map(([k,v]) => `
        <div class="flex items-center gap-2 mb-1.5">
          <div class="text-xs text-slate-400" style="width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(k)}</div>
          <div class="flex-1 rounded-full" style="background:#292524;height:6px;">
            <div class="rounded-full" style="background:#c15f3c;height:6px;width:${(v/maxB*100).toFixed(0)}%;"></div>
          </div>
          <div class="text-xs text-slate-300 text-right" style="width:24px;">${v}</div>
        </div>`).join('')
    }

    // Sector breakdown
    let sectorHtml = ''
    if (scan?.counts_by_sector) {
      sectorHtml = Object.entries(scan.counts_by_sector)
        .sort((a,b)=>b[1]-a[1])
        .map(([s,c]) => `<span class="badge b-inbox" style="margin:2px;">${esc(s)} ${c}</span>`)
        .join('')
    }

    // B1 stats
    let b1Html = '<p class="text-slate-500 text-xs">No B1 data.</p>'
    if (triage?.b1) {
      const { advance=0, hold=0, reject=0 } = triage.b1
      b1Html = `
        <div class="flex gap-4">
          <div class="text-center">
            <div class="text-2xl font-bold" style="color:#22c55e;">${advance}</div>
            <div class="text-xs text-slate-500">Advance</div>
          </div>
          <div class="text-center">
            <div class="text-2xl font-bold" style="color:#f59e0b;">${hold}</div>
            <div class="text-xs text-slate-500">Hold</div>
          </div>
          <div class="text-center">
            <div class="text-2xl font-bold" style="color:#ef4444;">${reject}</div>
            <div class="text-xs text-slate-500">Reject</div>
          </div>
        </div>`
    }

    // Deep dive shortlist
    let shortlistHtml = '<p class="text-slate-500 text-xs">No B2 data.</p>'
    if (triage?.deep_dive_shortlist?.length) {
      shortlistHtml = triage.deep_dive_shortlist.map((e,i) => `
        <div class="flex gap-3 py-2" style="border-bottom:1px solid #1c1917;">
          <span class="text-slate-600 text-sm w-5 flex-shrink-0">${i+1}.</span>
          <span class="font-mono font-semibold text-sm" style="color:#e07a5f;min-width:80px;">${esc(e.ticker)}</span>
          <span class="text-sm text-slate-300 flex-shrink-0">${esc(e.company||'')}</span>
          ${actionBadge(e.next_action)}
          <span class="text-xs text-slate-500 ml-auto truncate" title="${esc(e.reason)}" style="max-width:300px;">${esc(e.reason)}</span>
        </div>`).join('')
    }

    // B2 counts
    let b2Html = '<p class="text-slate-500 text-xs">No B2 data.</p>'
    if (triage?.b2) {
      const { deep_dive=0, refresh=0, monitor=0, discard=0 } = triage.b2
      b2Html = `
        <div class="flex gap-4 flex-wrap">
          <div class="text-center"><div class="text-xl font-bold" style="color:#e07a5f;">${deep_dive}</div><div class="text-xs text-slate-500">Deep Dive</div></div>
          <div class="text-center"><div class="text-xl font-bold" style="color:#a78bfa;">${refresh}</div><div class="text-xs text-slate-500">Refresh</div></div>
          <div class="text-center"><div class="text-xl font-bold" style="color:#4ade80;">${monitor}</div><div class="text-xs text-slate-500">Monitor</div></div>
          <div class="text-center"><div class="text-xl font-bold" style="color:#f87171;">${discard}</div><div class="text-xs text-slate-500">Discard</div></div>
        </div>`
    }

    container.innerHTML = `
      <div class="space-y-6">
        <div>
          <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-widest mb-3">Pipeline Flow</h2>
          ${flowHtml}
        </div>
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
          <div>
            <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-widest mb-3">
              Latest Scan ${scan ? `<span class="normal-case font-normal text-slate-600">&mdash; ${scan.scan_date}</span>` : ''}
            </h2>
            <div class="card p-4 space-y-4">
              <div>
                <div class="text-xs text-slate-500 mb-2">Buckets</div>
                ${bucketChartHtml}
              </div>
              ${sectorHtml ? `<div><div class="text-xs text-slate-500 mb-2">Sectors</div><div>${sectorHtml}</div></div>` : ''}
            </div>
          </div>
          <div class="space-y-4">
            <div>
              <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-widest mb-3">
                B1 Fast Triage ${triage ? `<span class="normal-case font-normal text-slate-600">&mdash; ${triage.triage_date}</span>` : ''}
              </h2>
              <div class="card p-4">${b1Html}</div>
            </div>
            <div>
              <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-widest mb-3">B2 Focused Triage</h2>
              <div class="card p-4 space-y-3">
                ${b2Html}
                ${triage?.deep_dive_shortlist?.length ? `<div class="pt-2" style="border-top:1px solid #292524;">${shortlistHtml}</div>` : ''}
              </div>
            </div>
          </div>
        </div>
      </div>`
